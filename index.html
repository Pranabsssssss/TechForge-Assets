<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TechForge Assets</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>TechForge</h1>
        <p class="muted">Team asset library</p>
      </div>
      <div class="controls">
        <input id="search" type="search" placeholder="Search assets (name or extension)" aria-label="Search assets">
        <select id="filter">
          <option value="all">All types</option>
          <option value="svg">SVG</option>
          <option value="png">PNG</option>
          <option value="jpg">JPG/JPEG</option>
          <option value="webp">WEBP</option>
        </select>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <h3>Instructions</h3>
        <ul>
          <li>Place image files into <span class="mono">/assets</span></li>
          <li>The page auto-discovers images and shows preview</li>
          <li>Use the search box to filter results</li>
        </ul>
      </aside>

      <section class="content">
        <div id="status" class="status">Loading assets…</div>
        <div id="grid" class="grid" role="list"></div>
      </section>
    </main>

    <footer class="footer">TechForge · Static asset viewer</footer>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
